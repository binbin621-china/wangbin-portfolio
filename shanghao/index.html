<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上号召唤器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      user-select: none;
    }

    /* 背景图 */
    .bg {
      position: fixed;
      inset: 0;
      background: url('bg.jpg') center/cover no-repeat;
      z-index: 0;
    }

    /* 初始遮罩 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }
    .overlay.hide {
      opacity: 0;
      pointer-events: none;
    }

    .overlay h1 {
      font-size: 3.5rem;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,100,100,0.8), 0 0 60px rgba(255,50,50,0.5);
      margin-bottom: 2rem;
      animation: breathe 2s ease-in-out infinite;
    }

    .overlay-hint {
      margin-top: 2rem;
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255,100,100,0.5); }
      50% { box-shadow: 0 0 80px rgba(255,100,100,0.9); }
    }

    /* 中央大字 */
    .center-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10rem;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 50px rgba(255,80,80,0.8), 0 0 100px rgba(255,0,0,0.5);
      z-index: 5;
      pointer-events: none;
      animation: crazyShake 0.3s ease-in-out infinite, colorShift 2s linear infinite;
      display: none;
    }
    .center-text.show { display: block; }

    @keyframes crazyShake {
      0%, 100% { transform: translate(-50%, -50%) rotate(-3deg) scale(1); }
      25% { transform: translate(-48%, -52%) rotate(2deg) scale(1.1); }
      50% { transform: translate(-52%, -48%) rotate(-2deg) scale(0.95); }
      75% { transform: translate(-49%, -51%) rotate(3deg) scale(1.05); }
    }
    @keyframes colorShift {
      0% { text-shadow: 0 0 50px rgba(255,80,80,0.8); color: #ff6b6b; }
      25% { text-shadow: 0 0 50px rgba(80,255,80,0.8); color: #55efc4; }
      50% { text-shadow: 0 0 50px rgba(80,80,255,0.8); color: #74b9ff; }
      75% { text-shadow: 0 0 50px rgba(255,255,80,0.8); color: #ffeaa7; }
      100% { text-shadow: 0 0 50px rgba(255,80,80,0.8); color: #ff6b6b; }
    }

    /* 弹窗 */
    .popup {
      position: fixed;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      cursor: default;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .popup .close {
      margin-left: 0.5rem;
      cursor: pointer;
      font-size: 1.2rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .popup .close:hover { opacity: 1; }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Windows风格假弹窗 */
    .win-popup {
      position: fixed;
      width: 320px;
      background: #f0f0f0;
      border: 2px solid #0078d7;
      border-radius: 8px;
      z-index: 20;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: winPop 0.3s ease;
      overflow: hidden;
    }
    .win-header {
      background: linear-gradient(90deg, #0078d7, #106ebe);
      color: #fff;
      padding: 0.5rem 0.8rem;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .win-close {
      cursor: pointer;
      font-weight: bold;
    }
    .win-body {
      padding: 1.2rem;
      color: #333;
      font-size: 0.9rem;
      text-align: center;
    }
    .win-body .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .win-btn {
      margin-top: 1rem;
      padding: 0.4rem 2rem;
      background: #0078d7;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .win-btn:hover { background: #106ebe; }

    @keyframes winPop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 底部计数器 */
    .counter {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-size: 1rem;
      z-index: 50;
      display: none;
    }
    .counter.show { display: block; }

    /* 顶部提示 */
    .top-hint {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,50,50,0.85);
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      z-index: 50;
      display: none;
      animation: shake 0.5s ease infinite;
    }
    .top-hint.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-50%) rotate(-2deg); }
      75% { transform: translateX(-50%) rotate(2deg); }
    }

    /* 漂浮emoji */
    .floater {
      position: fixed;
      font-size: 3rem;
      z-index: 3;
      pointer-events: none;
      animation: floatUp 3s ease-out forwards;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- 初始遮罩 -->
  <div class="overlay" id="overlay">
    <h1>🔥 上号召唤器 🔥</h1>
    <p class="overlay-hint">👉 点击任意位置开始召唤 👈</p>
  </div>

  <!-- 中央大字 -->
  <div class="center-text" id="centerText">上号</div>

  <!-- 底部计数器 -->
  <div class="counter" id="counter">已召唤 <span id="countNum">0</span> 次上号</div>

  <!-- 顶部提示 -->
  <div class="top-hint" id="topHint">⚠️ 疯狂点击关闭会召唤更多上号！按 ESC 5次可停止 ⚠️</div>

  <script>
    const overlay = document.getElementById('overlay');
    const centerText = document.getElementById('centerText');
    const counter = document.getElementById('counter');
    const countNum = document.getElementById('countNum');
    const topHint = document.getElementById('topHint');

    const messages = [
      '上号', '快上号', '上号！！', '上号吗', '召唤你上号',
      '立即上号', '上号搞起', '上号上分', '上号开黑',
      '别犹豫了上号', '上号带飞', '上号速来',
      '🎮 上号', '🔥 上号', '⚡ 上号', '💥 上号',
      '上号！！！', '上号上号', '快给我上号',
      '上号战神', '上号王者', '上号启动'
    ];

    const colors = [
      '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
      '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43',
      '#ee5a24', '#009432', '#0652dd', '#9980fa'
    ];

    let count = 0;
    let popupInterval;
    let floatInterval;
    let escCount = 0;
    let isRunning = false;
    let audioCtx;
    let bgmInterval;
    let audioStarted = false;

    // 音符频率表
    const notes = {
      'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61,
      'G2': 98.00, 'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
      'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
      'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25,
      'D5': 587.33, 'E5': 659.25
    };

    // 魔性旋律 (小星星加速版)
    const melody = [
      'C4','C4','G4','G4','A4','A4','G4',null,
      'F4','F4','E4','E4','D4','D4','C4',null,
      'G4','G4','F4','F4','E4','E4','D4',null,
      'G4','G4','F4','F4','E4','E4','D4',null,
      'C4','C4','G4','G4','A4','A4','G4',null,
      'F4','F4','E4','E4','D4','D4','C4',null
    ];
    const bassLine = [
      'C3',null,'G2',null,'C3',null,'G2',null,
      'F3',null,'C3',null,'G2',null,'C3',null,
      'G2',null,'C3',null,'G2',null,'C3',null,
      'G2',null,'C3',null,'G2',null,'C3',null
    ];

    function playTone(freq, duration, type, volume) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      gain.gain.value = volume || 0.08;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playPopupSound() {
      if (!audioCtx) return;
      // 短促高音"叮"
      playTone(notes['C5'], 0.08, 'sine', 0.05);
      setTimeout(() => playTone(notes['E5'], 0.08, 'sine', 0.04), 60);
    }

    function playStartSound() {
      if (!audioCtx) return;
      // 上行琶音启动音效
      [notes['C4'], notes['E4'], notes['G4'], notes['C5']].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.2, 'square', 0.1), i * 120);
      });
      // 鼓点"咚咚"
      setTimeout(() => playTone(60, 0.15, 'sawtooth', 0.2), 0);
      setTimeout(() => playTone(60, 0.15, 'sawtooth', 0.2), 480);
    }

    function startBGM() {
      let step = 0;
      bgmInterval = setInterval(() => {
        if (!isRunning) return;
        const m = melody[step % melody.length];
        if (m) playTone(notes[m], 0.12, 'square', 0.07);
        const b = bassLine[step % bassLine.length];
        if (b) playTone(notes[b], 0.18, 'sawtooth', 0.05);
        // 每4拍加一个鼓点
        if (step % 4 === 0) {
          playTone(50, 0.08, 'sawtooth', 0.12);
        }
        step++;
      }, 130); // 约 230 BPM，很急促很魔性
    }

    function stopAudio() {
      if (bgmInterval) clearInterval(bgmInterval);
      if (audioCtx) audioCtx.close();
      audioCtx = null;
      audioStarted = false;
    }

    // 点击遮罩层任意位置开始
    overlay.addEventListener('click', () => {
      if (isRunning) return;
      // 初始化音频（必须用户交互后）
      if (!audioStarted) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioStarted = true;
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      overlay.classList.add('hide');
      centerText.classList.add('show');
      counter.classList.add('show');
      topHint.classList.add('show');
      isRunning = true;

      playStartSound();
      setTimeout(startBGM, 500);

      // 立即弹几个
      for (let i = 0; i < 5; i++) {
        setTimeout(() => { createPopup(); playPopupSound(); }, i * 150);
      }

      // 持续弹出
      popupInterval = setInterval(() => { createPopup(); playPopupSound(); }, 600);

      // 漂浮emoji
      floatInterval = setInterval(createFloater, 800);

      // 偶尔弹出Windows假弹窗
      setTimeout(() => createWinPopup(), 2000);
      setTimeout(() => createWinPopup(), 6000);
    });

    function createPopup() {
      const popup = document.createElement('div');
      popup.className = 'popup';
      const msg = messages[Math.floor(Math.random() * messages.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];
      popup.style.background = color;
      popup.style.left = Math.random() * (window.innerWidth - 200) + 'px';
      popup.style.top = Math.random() * (window.innerHeight - 100) + 'px';
      popup.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
      popup.innerHTML = `${msg}<span class="close">✕</span>`;
      document.body.appendChild(popup);

      count++;
      countNum.textContent = count;

      // 点击关闭会触发更多
      popup.querySelector('.close').addEventListener('click', (e) => {
        e.stopPropagation();
        popup.remove();
        // 报复性弹出3个
        for (let i = 0; i < 3; i++) {
          setTimeout(createPopup, i * 100);
        }
      });

      // 5秒后自动消失
      setTimeout(() => {
        if (popup.parentNode) {
          popup.style.transition = 'opacity 0.5s, transform 0.5s';
          popup.style.opacity = '0';
          popup.style.transform += ' scale(0)';
          setTimeout(() => popup.remove(), 500);
        }
      }, 5000);
    }

    function createWinPopup() {
      if (!isRunning) return;
      const win = document.createElement('div');
      win.className = 'win-popup';
      win.style.left = Math.random() * (window.innerWidth - 340) + 20 + 'px';
      win.style.top = Math.random() * (window.innerHeight - 200) + 20 + 'px';
      win.innerHTML = `
        <div class="win-header">
          <span>系统提示</span>
          <span class="win-close">✕</span>
        </div>
        <div class="win-body">
          <div class="icon">⚠️</div>
          <div>检测到您尚未上号</div>
          <div style="margin-top:0.3rem;font-size:0.8rem;color:#666;">请立即上号以避免严重后果</div>
          <button class="win-btn">立即上号</button>
        </div>
      `;
      document.body.appendChild(win);

      count += 2;
      countNum.textContent = count;

      win.querySelector('.win-close').addEventListener('click', () => {
        win.remove();
        for (let i = 0; i < 4; i++) setTimeout(createPopup, i * 80);
      });
      win.querySelector('.win-btn').addEventListener('click', () => {
        win.remove();
        for (let i = 0; i < 6; i++) setTimeout(createPopup, i * 60);
      });

      setTimeout(() => {
        if (win.parentNode) win.remove();
      }, 7000);
    }

    function createFloater() {
      const emojis = ['🎮', '🔥', '⚡', '💥', '🚀', '👾', '🎯', '🏆'];
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * window.innerWidth + 'px';
      el.style.bottom = '10%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ESC 按5次停止
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isRunning) {
        escCount++;
        if (escCount >= 5) {
          isRunning = false;
          clearInterval(popupInterval);
          clearInterval(floatInterval);
          stopAudio();
          centerText.textContent = '已结束';
          centerText.style.animation = 'none';
          topHint.textContent = '✅ 上号召唤已停止，刷新页面可重新开始';
          topHint.style.background = 'rgba(0,150,0,0.85)';
        } else {
          topHint.textContent = `再按 ${5 - escCount} 次 ESC 可停止...`;
        }
      }
    });

    // 点击页面空白处也弹
    document.addEventListener('click', (e) => {
      if (isRunning && e.target === document.body) {
        createPopup();
      }
    });
  </script>
</body>
</html>
